name: sigap_mobile
description: SIGAP Mobile App - Sexual Harassment Reporting System
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  
  # State Management (uncomment when needed)
  # provider: ^6.1.1
  
  # Firebase (uncomment when needed)
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.16.0
  # cloud_firestore: ^4.14.0
  # firebase_messaging: ^14.7.10
  
  # Location (uncomment when needed)
  # geolocator: ^11.0.0
  # permission_handler: ^11.2.0
  
  # HTTP
  http: ^1.2.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_overlay_window: ^0.5.0
  vibration: ^3.1.7
  # dio: ^5.4.0 (uncomment when needed)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_sigap.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_sigap.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/articles/
    - assets/images/onboarding/
    - assets/animations/
